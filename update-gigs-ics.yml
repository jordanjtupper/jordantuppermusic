name: Update gigs ICS

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'index.html'
      - 'jordan-calendar.js'
      - 'calendar-export.js'
      - 'scripts/build-gigs-ics.js'
      - '.github/workflows/update-gigs-ics.yml'

permissions:
  contents: write

jobs:
  update-gigs-ics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build gigs.ics
        run: node scripts/build-gigs-ics.js

      - name: Commit updated calendar files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update generated gigs calendar feed'
          file_pattern: 'gigs.ics data/all-gigs.json'
